  <circle cx="91.4" cy="63.4" r="3.5" fill="#1B3A6B"/>
  <circle cx="85.2" cy="75.6" r="3.5" fill="#1B3A6B"/>
  <circle cx="75.6" cy="85.2" r="3.5" fill="#1B3A6B"/>
  <circle cx="63.4" cy="91.4" r="3.5" fill="#1B3A6B"/>
  <circle cx="50.0" cy="93.5" r="3.5" fill="#1B3A6B"/>
  <circle cx="36.6" cy="91.4" r="3.5" fill="#1B3A6B"/>
  <circle cx="24.4" cy="85.2" r="3.5" fill="#1B3A6B"/>
  <circle cx="14.8" cy="75.6" r="3.5" fill="#1B3A6B"/>
  <circle cx="8.6"  cy="63.4" r="3.5" fill="#1B3A6B"/>
  <circle cx="6.5"  cy="50.0" r="3.5" fill="#1B3A6B"/>
  <circle cx="8.6"  cy="36.6" r="3.5" fill="#1B3A6B"/>
  <circle cx="14.8" cy="24.4" r="3.5" fill="#1B3A6B"/>
