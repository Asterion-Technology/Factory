  <circle cx="63.4" cy="8.6"  r="3.5" fill="#1B3A6B"/>
  <circle cx="75.6" cy="14.8" r="3.5" fill="#1B3A6B"/>
  <circle cx="85.2" cy="24.4" r="3.5" fill="#1B3A6B"/>
  <circle cx="91.4" cy="36.6" r="3.5" fill="#1B3A6B"/>

  <!-- Gold inner panel -->
  <circle cx="50" cy="50" r="36" fill="#D4AF37"/>

  <!-- Navy M -->
  <text x="50" y="50"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="32"
        font-weight="bold"
        fill="#1B3A6B"
        text-anchor="middle"
        dominant-baseline="central">M</text>
