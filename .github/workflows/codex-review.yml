name: Codex Independent Review

on:
  pull_request:
    branches: [main, staging]
    types: [opened, synchronize, ready_for_review]

jobs:
  codex-review:
    name: Codex Review (GPT-4o)
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff (truncate to 3000 lines)
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr.diff
          DIFF_LINES=$(wc -l < /tmp/pr.diff)
          echo "diff_lines=${DIFF_LINES}" >> $GITHUB_OUTPUT

          # Truncate very large diffs to fit context window
          if [ "$DIFF_LINES" -gt 3000 ]; then
            head -3000 /tmp/pr.diff > /tmp/pr-truncated.diff
            echo "truncated=true" >> $GITHUB_OUTPUT
            echo "[warn] Diff truncated at 3000 lines for context window"
          else
            cp /tmp/pr.diff /tmp/pr-truncated.diff
            echo "truncated=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Codex review via LiteLLM
        id: review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          DIFF_TRUNCATED: ${{ steps.diff.outputs.truncated }}
        run: |
          DIFF=$(cat /tmp/pr-truncated.diff)
          TRUNCATION_NOTE=""
          if [ "$DIFF_TRUNCATED" = "true" ]; then
            TRUNCATION_NOTE="Note: The diff was truncated to 3000 lines due to size. Review may be incomplete."
          fi

          PROMPT="You are an independent senior engineer reviewing a Pull Request. You did not write this code.

          PR Title: ${PR_TITLE}
          PR Description: ${PR_BODY}
          ${TRUNCATION_NOTE}

          Diff:
          \`\`\`
          ${DIFF}
          \`\`\`

          Review the following:
          1. Correctness — does the implementation match the stated goal? Are there logic errors or missing edge cases?
          2. Security — any OWASP Top 10 issues, injection risks, broken access control, insecure data handling?
          3. Code quality — readability, dead code, simpler alternatives?
          4. Tests — are the acceptance criteria covered? Missing edge cases?

          Output your review in this exact format:

          ## Independent Review — Codex

          ### Summary
          [1 paragraph overall assessment]

          ### Findings

          | Severity | Category | Finding | Location |
          |---|---|---|---|
          [table rows or 'None found' if clean]

          ### Verdict
          [One of: Approve | Request Changes | Block]

          Block is reserved for critical security issues only (e.g., auth bypass, SQL injection, secret exposure).

          ### Notes
          [Any architectural observations or alternative approaches — omit section if none]"

          RESPONSE=$(curl -sf https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer ${OPENAI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg content "$PROMPT" '{
              model: "gpt-4o-2024-08-06",
              messages: [{role: "user", content: $content}],
              max_tokens: 2000,
              temperature: 0.1
            }')" 2>/dev/null) || true

          if [ -n "$RESPONSE" ]; then
            REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Review generation failed"')
          else
            REVIEW="## Independent Review — Codex\n\nReview unavailable — OpenAI API call failed. Manual review required."
          fi

          echo "$REVIEW" > /tmp/review.md
          echo "review_generated=true" >> $GITHUB_OUTPUT

      - name: Post review as PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/review.md', 'utf8');
            const verdict = review.includes('Block') ? '🔴' : review.includes('Request Changes') ? '🟡' : '🟢';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${verdict} **Automated Codex Review**\n\n${review}\n\n---\n*Generated by factory-codex-reviewer | Model: gpt-4o-2024-08-06*`
            });

      - name: Fail CI on Block verdict
        run: |
          REVIEW=$(cat /tmp/review.md)
          if echo "$REVIEW" | grep -q "### Verdict" && echo "$REVIEW" | grep -A1 "### Verdict" | grep -q "^Block$"; then
            echo "[fail] Codex returned a Block verdict — human override required before merge"
            exit 1
          fi
          echo "[ok] Codex verdict does not block merge"
