name: Auto Changelog

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  generate-changelog:
    name: Generate Changelog Entry
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    permissions:
      contents: write
      pull-requests: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up git identity
        run: |
          git config user.name "factory-bot"
          git config user.email "factory-bot@users.noreply.github.com"

      - name: Generate changelog entry via Ollama
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OLLAMA_HOST: ${{ vars.OLLAMA_HOST || 'http://localhost:11434' }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Ollama is not available in GitHub Actions — changelog.sh will fall back
          # to the git-log template path automatically (no OLLAMA_HOST reachable)
          bash scripts/changelog.sh \
            --pr "$PR_NUMBER" \
            --output CHANGELOG.md

      - name: Commit changelog update
        run: |
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "[skip] No changelog changes to commit"
            exit 0
          fi
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          git commit -m "docs: changelog for PR #${PR_NUMBER} — ${PR_TITLE}

          Auto-generated by factory changelog workflow.

          Co-Authored-By: factory-bot <factory-bot@users.noreply.github.com>"
          git push origin main
